<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Flyer Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --border: #222222;
    --gold: #c9a84c;
    --gold-dim: rgba(201,168,76,0.15);
    --gold-glow: rgba(201,168,76,0.4);
    --text: #e8e8e8;
    --text-dim: #666;
    --green: #4caf7d;
    --red: #e05555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }

  /* ── ヘッダー ── */
  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo-mark {
    width: 56px;
    height: 56px;
    margin: 0 auto 16px;
  }

  h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(1.4rem, 5vw, 2rem);
    color: var(--gold);
    letter-spacing: 0.08em;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 0.15em;
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* ── メインカード ── */
  .card {
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 32px;
    margin-bottom: 20px;
  }

  /* ── アップロードゾーン ── */
  .upload-zone {
    border: 1px dashed var(--gold);
    border-radius: 2px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .upload-zone:hover {
    background: var(--gold-dim);
  }

  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .upload-icon {
    font-size: 2.4rem;
    margin-bottom: 12px;
  }

  .upload-label {
    font-size: 0.85rem;
    color: var(--text-dim);
    line-height: 1.6;
  }

  .upload-label span {
    color: var(--gold);
  }

  /* ── プレビュー ── */
  #preview-wrap {
    display: none;
    margin-top: 20px;
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  #preview-wrap img {
    width: 100%;
    display: block;
    max-height: 320px;
    object-fit: contain;
    background: #000;
  }

  .preview-label {
    padding: 8px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    color: var(--text-dim);
    border-top: 1px solid var(--border);
  }

  /* ── ボタン ── */
  .scan-btn {
    display: block;
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    border-radius: 2px;
  }

  .scan-btn:hover:not(:disabled) {
    background: var(--gold);
    color: #000;
  }

  .scan-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
  }

  /* ── ローディング ── */
  #loading {
    display: none;
    text-align: center;
    padding: 32px 0;
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
  }

  /* ── 結果 ── */
  #result-card {
    display: none;
    width: 100%;
    max-width: 560px;
    background: var(--surface);
    border: 1px solid var(--gold);
    border-radius: 2px;
    overflow: hidden;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .result-dot {
    width: 8px;
    height: 8px;
    background: var(--green);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  .result-title {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--gold);
    letter-spacing: 0.12em;
  }

  .result-body {
    padding: 24px;
    font-size: 0.9rem;
    line-height: 1.8;
    white-space: pre-wrap;
    color: var(--text);
  }

  /* ── セクション区切り ── */
  .section-line {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── フッター ── */
  footer {
    margin-top: 48px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-align: center;
  }

  /* ── エラー ── */
  .error-msg {
    display: none;
    margin-top: 16px;
    padding: 12px 16px;
    border: 1px solid var(--red);
    border-radius: 2px;
    font-size: 0.8rem;
    color: var(--red);
  }

  /* ── API KEY入力 ── */
  .api-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .api-input {
    flex: 1;
    background: #000;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus { border-color: var(--gold); }
  .api-input::placeholder { color: var(--text-dim); }

  .api-label {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-bottom: 8px;
    letter-spacing: 0.08em;
  }
</style>
</head>
<body>

<header>
  <!-- SVGロゴ：スキャンライン風 -->
  <svg class="logo-mark" viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="4" y="4" width="20" height="20" stroke="#c9a84c" stroke-width="1.5"/>
    <rect x="32" y="4" width="20" height="20" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <rect x="4" y="32" width="20" height="20" stroke="#c9a84c" stroke-width="1.5" opacity="0.5"/>
    <rect x="32" y="32" width="20" height="20" stroke="#c9a84c" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="28" x2="56" y2="28" stroke="#c9a84c" stroke-width="1" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,-24;0,24;0,-24" dur="2.5s" repeatCount="indefinite"/>
    </line>
  </svg>
  <h1>AI FLYER SCANNER</h1>
  <p class="subtitle">チラシ → 献立提案 / 情報抽出</p>
</header>

<div class="card">
  <!-- API KEY -->
  <p class="api-label">ANTHROPIC API KEY</p>
  <div class="api-row">
    <input class="api-input" type="password" id="api-key" placeholder="sk-ant-..." autocomplete="off">
  </div>

  <hr class="section-line">

  <!-- アップロード -->
  <div class="upload-zone" id="upload-zone">
    <input type="file" id="file-input" accept="image/*">
    <div class="upload-icon">📋</div>
    <p class="upload-label">
      チラシ画像を選択<br>
      <span>タップしてアップロード</span>
    </p>
  </div>

  <!-- プレビュー -->
  <div id="preview-wrap">
    <img id="preview-img" src="" alt="プレビュー">
    <p class="preview-label" id="preview-label">—</p>
  </div>

  <!-- スキャンボタン -->
  <button class="scan-btn" id="scan-btn" disabled>SCAN &amp; ANALYZE</button>

  <!-- エラー -->
  <p class="error-msg" id="error-msg"></p>

  <!-- ローディング -->
  <div id="loading">
    <div class="spinner"></div>
    <p class="loading-text">AI SCANNING...</p>
  </div>
</div>

<!-- 結果 -->
<div id="result-card">
  <div class="result-header">
    <div class="result-dot"></div>
    <span class="result-title">SCAN RESULT</span>
  </div>
  <div class="result-body" id="result-body"></div>
</div>

<footer>tomu_ai_dev — AI FLYER SCANNER v1.0</footer>

<script>
  const fileInput = document.getElementById('file-input');
  const previewWrap = document.getElementById('preview-wrap');
  const previewImg = document.getElementById('preview-img');
  const previewLabel = document.getElementById('preview-label');
  const scanBtn = document.getElementById('scan-btn');
  const loading = document.getElementById('loading');
  const resultCard = document.getElementById('result-card');
  const resultBody = document.getElementById('result-body');
  const errorMsg = document.getElementById('error-msg');
  const apiKeyInput = document.getElementById('api-key');

  let base64Image = null;
  let mediaType = 'image/jpeg';

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    mediaType = file.type || 'image/jpeg';
    previewLabel.textContent = file.name + ' — ' + (file.size / 1024).toFixed(1) + ' KB';

    const reader = new FileReader();
    reader.onload = (ev) => {
      previewImg.src = ev.target.result;
      previewWrap.style.display = 'block';
      base64Image = ev.target.result.split(',')[1];
      scanBtn.disabled = false;
    };
    reader.readAsDataURL(file);
  });

  scanBtn.addEventListener('click', async () => {
    const apiKey = apiKeyInput.value.trim();
    if (!apiKey) {
      showError('APIキーを入力してください。');
      return;
    }
    if (!base64Image) {
      showError('チラシ画像を選択してください。');
      return;
    }

    // UI切り替え
    scanBtn.disabled = true;
    loading.style.display = 'block';
    resultCard.style.display = 'none';
    errorMsg.style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
        },
        body: JSON.stringify({
          model: 'claude-opus-4-5',
          max_tokens: 1024,
          messages: [
            {
              role: 'user',
              content: [
                {
                  type: 'image',
                  source: {
                    type: 'base64',
                    media_type: mediaType,
                    data: base64Image,
                  },
                },
                {
                  type: 'text',
                  text: 'このチラシ画像から以下の情報を抽出して日本語で答えてください：\n\n1. 📅 日付・期間\n2. 🏪 店舗名・場所\n3. 🛒 目玉商品・特売内容（上位5点）\n4. 🍽️ このチラシの特売品を使ったおすすめ献立を1つ提案してください（材料と簡単な作り方も）\n\n情報が読み取れない場合はその旨を教えてください。',
                },
              ],
            },
          ],
        }),
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API Error: ${response.status}`);
      }

      const data = await response.json();
      const text = data.content.map(b => b.text || '').join('');

      resultBody.textContent = text;
      resultCard.style.display = 'block';
      resultCard.scrollIntoView({ behavior: 'smooth', block: 'start' });

    } catch (err) {
      showError('エラー: ' + err.message);
    } finally {
      loading.style.display = 'none';
      scanBtn.disabled = false;
    }
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    loading.style.display = 'none';
    scanBtn.disabled = false;
  }
</script>
</body>
</html>
